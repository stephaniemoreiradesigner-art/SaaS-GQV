<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atualizando Banco de Dados...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script> <!-- Para pegar as configs do Supabase -->
    <!-- Theme & Tailwind -->
    <script src="js/theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center justify-center p-6">
    <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center border border-gray-100">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Atualização do Banco de Dados</h1>
        <p class="text-gray-600 mb-6">Aguarde enquanto configuramos a tabela de criativos...</p>
        <div id="status" class="p-4 rounded-lg bg-gray-100 text-gray-700 font-medium text-sm animate-pulse">Iniciando...</div>
    </div>

    <script>
        async function setupDatabase() {
            const statusDiv = document.getElementById('status');
            
            try {
                // Aguarda app.js carregar configs
                if (!window.supabaseClient) {
                    statusDiv.innerHTML = "Aguardando conexão com Supabase...";
                    await new Promise(r => setTimeout(r, 1000));
                }

                statusDiv.innerHTML = "Executando SQL...";

                // SQL para recriar a tabela
                const sql = `
                    DROP TABLE IF EXISTS public.ad_creatives CASCADE;

                    CREATE TABLE public.ad_creatives (
                        id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
                        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
                        cliente_id BIGINT REFERENCES public.clientes(id) ON DELETE CASCADE,
                        titulo TEXT NOT NULL,
                        formato TEXT,
                        descricao TEXT,
                        arquivo_url TEXT,
                        status TEXT DEFAULT 'em_criacao',
                        numero_sequencial INT,
                        etapa_funil TEXT,
                        objetivo TEXT,
                        copy TEXT,
                        data_inicio DATE,
                        data_termino DATE,
                        principal_metrica TEXT,
                        resultado TEXT,
                        observacoes TEXT
                    );

                    ALTER TABLE public.ad_creatives ENABLE ROW LEVEL SECURITY;

                    CREATE POLICY "Authenticated users can manage ad_creatives" 
                    ON public.ad_creatives FOR ALL 
                    USING (auth.role() = 'authenticated');
                `;

                // Como não podemos executar SQL direto pelo cliente JS padrão sem uma função RPC,
                // vamos tentar usar a API REST se tivermos permissão, ou avisar o usuário.
                // Mas espere, o usuário "NoCode" não vai saber rodar SQL.
                // O jeito mais garantido se não tivermos RPC 'exec_sql' configurada é pedir para o usuário rodar no painel do Supabase.
                
                // TENTATIVA VIA RPC (Se existir uma função exec_sql configurada no projeto)
                const { error } = await window.supabaseClient.rpc('exec_sql', { query: sql });
                
                if (error) {
                    // Se falhar RPC, vamos tentar criar via interface se possível, mas tabelas não dá.
                    console.error(error);
                    throw new Error("Não foi possível executar o SQL automaticamente. Você precisará rodar o SQL no painel do Supabase.");
                }

                statusDiv.className = 'success';
                statusDiv.innerHTML = "Banco de dados atualizado com sucesso! Pode fechar esta página.";

            } catch (e) {
                console.error(e);
                statusDiv.className = 'error';
                statusDiv.innerHTML = `
                    <strong>Erro ao atualizar automaticamente:</strong><br>${e.message}<br><br>
                    Como corrigir manualmente:<br>
                    1. Acesse seu painel do Supabase (SQL Editor).<br>
                    2. Cole e execute o código SQL abaixo:<br>
                    <textarea style="width:100%; height:300px; margin-top:10px;">
DROP TABLE IF EXISTS public.ad_creatives CASCADE;

CREATE TABLE public.ad_creatives (
    id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
    created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
    cliente_id BIGINT REFERENCES public.clientes(id) ON DELETE CASCADE,
    titulo TEXT NOT NULL,
    formato TEXT,
    descricao TEXT,
    arquivo_url TEXT,
    status TEXT DEFAULT 'em_criacao',
    numero_sequencial INT,
    etapa_funil TEXT,
    objetivo TEXT,
    copy TEXT,
    data_inicio DATE,
    data_termino DATE,
    principal_metrica TEXT,
    resultado TEXT,
    observacoes TEXT
);

ALTER TABLE public.ad_creatives ENABLE ROW LEVEL SECURITY;

CREATE POLICY "Authenticated users can manage ad_creatives" 
ON public.ad_creatives FOR ALL 
USING (auth.role() = 'authenticated');
                    </textarea>
                `;
            }
        }

        setupDatabase();
    </script>
</body>
</html>
