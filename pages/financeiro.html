<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Construção - Gestão Que Vende</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="../js/theme.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans h-screen flex flex-col items-center justify-center">
    <div class="text-center p-8 max-w-lg">
        <div class="mb-6 text-[var(--color-primary)]">
            <i class="fas fa-hard-hat text-6xl animate-bounce"></i>
        </div>
        <h1 class="text-3xl font-bold text-gray-900 mb-4">Módulo em Construção</h1>
        <p class="text-gray-600 mb-8 text-lg">
            Estamos focados em entregar a melhor experiência para você. 
            Este módulo estará disponível em breve com novidades incríveis!
        </p>
        <div class="space-y-4">
            <a href="dashboard.html" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-[var(--color-primary)] hover:bg-opacity-90 transition-colors shadow-sm w-full sm:w-auto">
                <i class="fas fa-home mr-2"></i> Voltar para Home
            </a>
            <button onclick="history.back()" class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 text-base font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 transition-colors shadow-sm w-full sm:w-auto ml-0 sm:ml-4">
                <i class="fas fa-arrow-left mr-2"></i> Voltar Anterior
            </button>
        </div>
        <div class="mt-12 text-sm text-gray-400">
            <p>Previsão de lançamento: 2026</p>
        </div>
    </div>
</body>
</html>
