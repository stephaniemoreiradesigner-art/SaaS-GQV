<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gestão Que Vende</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Theme & Tailwind -->
    <script src="js/theme.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <img id="logo-sidebar" class="mx-auto h-20 w-auto mb-6 object-contain" src="assets/logo.png" alt="Gestão Que Vende">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Criar Conta</h2>
            <p class="mt-2 text-sm text-gray-500">
                Comece a gerenciar seu negócio hoje
            </p>
        </div>
        
        <form class="mt-8 space-y-6" id="registerForm">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400 text-sm"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="seu@email.com">
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="password" name="password" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="Repita a senha">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-user-plus text-white/70 group-hover:text-white transition-colors"></i>
                    </span>
                    Cadastrar
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4 pt-4 border-t border-gray-100">
            <p class="text-sm text-gray-600">
                Já tem uma conta? 
                <a href="index.html" class="font-medium text-primary hover:text-primary-hover transition-colors">
                    Faça Login
                </a>
            </p>
        </div>
    </div>

    <!-- Script de Cadastro -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gbqknmejsmnizjdnopnq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdicWtubWVqc21uaXpqZG5vcG5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMjkyOTMsImV4cCI6MjA3ODgwNTI5M30.w-v_CW3X5DF9x_nnFe3Lhvw_JyrXxfXKv7tPIZAjGaU';

        document.addEventListener('DOMContentLoaded', () => {
            console.log('Script de cadastro carregado');
            
            let supabase;
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                } else {
                    console.error('Supabase lib não carregada');
                }
            } catch (e) {
                console.error('Erro init supabase', e);
            }

            const form = document.getElementById('registerForm');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault(); 
                    console.log('Botão clicado - submit prevenido');

                    if (!supabase) {
                        alert('Erro: Sistema não conectou ao banco de dados. Recarregue a página.');
                        return;
                    }

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    const btn = form.querySelector('button');
                    const originalContent = btn.innerHTML;

                    if (password !== confirmPassword) {
                        alert('As senhas não conferem!');
                        return;
                    }

                    try {
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processando...';
                        btn.disabled = true;
                        btn.classList.add('opacity-75', 'cursor-not-allowed');

                        // Verificar permissão
                        const { data: colab, error: colabError } = await supabase
                            .from('colaboradores')
                            .select('email')
                            .eq('email', email)
                            .maybeSingle();

                        if (colabError) {
                            throw new Error('Erro ao verificar permissão: ' + colabError.message);
                        }

                        if (!colab) {
                            alert('E-mail não encontrado na base de convites. Peça ao Administrador para cadastrar seu e-mail antes de criar a senha.');
                            return; 
                        }

                        const isFile = window.location.origin === 'null';
                        const redirectUrl = isFile
                            ? window.location.href.replace('cadastro.html', 'index.html')
                            : window.location.origin + '/index.html';

                        const { data, error } = await supabase.auth.signUp({
                            email: email,
                            password: password,
                            options: {
                                emailRedirectTo: redirectUrl
                            }
                        });

                        if (error) throw error;

                        console.log('Sucesso:', data);
                        alert('Conta criada com sucesso! Você será redirecionado para o login.');
                        window.location.href = 'index.html';

                    } catch (error) {
                        console.error('Erro:', error);
                        alert('Erro ao criar conta: ' + (error.message || error.error_description));
                    } finally {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        btn.classList.remove('opacity-75', 'cursor-not-allowed');
                    }
                });
            }
        });
    </script>
</body>
</html>
