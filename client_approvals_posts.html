<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Posts - Painel do Cliente</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="w-full bg-white border-b border-gray-200 z-10">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <button id="btnBackDashboard" type="button" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition focus:outline-none focus:ring-2 focus:ring-purple-300" onclick="window.location.href='client_dashboard.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M12.707 15.707a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 111.414 1.414L8.414 9H17a1 1 0 110 2H8.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Voltar ao Painel
                </button>
                <button onclick="window.clientApp && window.clientApp.clientLogout()" class="inline-flex items-center px-4 py-2 rounded-xl bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 transition focus:outline-none focus:ring-2 focus:ring-purple-300">Sair</button>
            </div>
        </header>

        <main class="flex-1 px-4 py-10">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Aprovação de Posts</h1>
                <div id="client-approvals-list" class="grid grid-cols-1 gap-4"></div>
                <div id="client-approvals-empty" class="hidden bg-white border border-gray-200 rounded-xl p-6 text-center text-sm text-gray-500">
                    Nenhum item pendente por enquanto
                </div>
            </div>
        </main>
    </div>
    <script src="js/client_app.js"></script>
    <script src="js/client_approvals.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.clientApp && window.clientApp.requireClientAuth) {
                window.clientApp.requireClientAuth();
            }
        });
    </script>
    <div id="client-approval-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <div>
                    <h2 id="client-approval-title" class="text-lg font-semibold text-gray-900"></h2>
                    <span id="client-approval-status" class="inline-flex items-center mt-2 px-3 py-1 rounded-full text-xs font-medium"></span>
                </div>
                <button id="client-approval-close" class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="px-6 py-4 space-y-4">
                <a id="client-approval-preview" href="#" target="_blank" class="text-sm text-primary hover:underline hidden">Abrir preview</a>
                <div id="client-approval-media" class="hidden w-full h-64 bg-gray-50 border border-gray-200 rounded-xl overflow-hidden flex items-center justify-center text-gray-400 text-sm"></div>
                <div>
                    <h3 class="text-sm font-semibold text-gray-700 mb-2">Legenda</h3>
                    <p id="client-approval-caption" class="text-sm text-gray-600 whitespace-pre-wrap bg-gray-50 border border-gray-200 rounded-lg p-3"></p>
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-gray-700 mb-2">Comentários</h3>
                    <div id="client-approval-comments" class="space-y-3 max-h-60 overflow-y-auto pr-1"></div>
                </div>
                <div>
                    <textarea id="client-approval-comment-input" rows="3" class="w-full rounded-lg border border-gray-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Escreva um comentário..."></textarea>
                    <div class="flex justify-end mt-3">
                        <button id="client-approval-comment-btn" class="px-4 py-2 rounded-lg bg-gray-900 text-white hover:bg-gray-800 transition">Enviar comentário</button>
                    </div>
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex flex-wrap justify-end gap-3">
                <button id="client-approval-changes" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition">Solicitar ajustes</button>
                <button id="client-approval-approve" class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">Aprovar</button>
            </div>
        </div>
    </div>
</body>
</html>
