<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Calendário - Painel do Cliente</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="w-full bg-white border-b border-gray-200 z-10">
            <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
                <button id="btnBackDashboard" type="button" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 transition focus:outline-none focus:ring-2 focus:ring-purple-300" onclick="window.location.href='client_dashboard.html'">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M12.707 15.707a1 1 0 01-1.414 0l-5-5a1 1 0 010-1.414l5-5a1 1 0 111.414 1.414L8.414 9H17a1 1 0 110 2H8.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                    </svg>
                    Voltar ao Painel
                </button>
                <button onclick="window.clientApp && window.clientApp.clientLogout()" class="inline-flex items-center px-4 py-2 rounded-xl bg-white border border-gray-300 text-gray-700 hover:bg-gray-50 transition focus:outline-none focus:ring-2 focus:ring-purple-300">Sair</button>
            </div>
        </header>

        <main class="flex-1 px-4 py-10">
            <div class="max-w-6xl mx-auto space-y-8">
                <div class="flex flex-col gap-4">
                    <h1 class="text-2xl font-bold text-gray-900">Aprovação de Calendário</h1>
                    <div class="flex flex-col gap-3">
                        <div class="flex flex-col gap-2 max-w-xs">
                            <label for="calendar-month-input" class="text-sm font-medium text-gray-700">Selecione o mês</label>
                            <input id="calendar-month-input" type="month" class="w-full rounded-xl border border-gray-300 bg-white px-4 py-2 text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-300">
                        </div>
                        <button id="client-approval-batch-btn" type="button" class="hidden w-fit px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">
                            Aprovar Post(s)
                        </button>
                    </div>
                </div>
                <div id="calendar-error-state" class="hidden">
                    <div class="max-w-2xl bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700">
                        <span id="calendar-error-message">Erro ao carregar calendário. Tente novamente.</span>
                        <span id="calendar-error-detail" class="hidden text-xs text-red-500 mt-1"></span>
                    </div>
                </div>

                <div id="calendar-empty-state" class="hidden">
                    <div class="max-w-md mx-auto bg-white border border-gray-200 rounded-xl p-8 text-center text-gray-600">
                        <div class="w-12 h-12 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center text-gray-400">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <p class="text-base font-semibold text-gray-700">Não há calendário pronto para o período</p>
                        <p class="text-sm text-gray-500 mt-2">Assim que o time liberar conteúdos para este mês, eles aparecerão aqui.</p>
                    </div>
                </div>

                <div id="calendar-container" class="space-y-4">
                    <div class="grid grid-cols-7 gap-px bg-gray-200 rounded-xl overflow-hidden text-xs text-gray-500">
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Dom</div>
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Seg</div>
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Ter</div>
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Qua</div>
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Qui</div>
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Sex</div>
                        <div class="bg-gray-50 px-3 py-2 text-center font-semibold">Sáb</div>
                    </div>
                    <div id="client-calendar-grid" class="grid grid-cols-7 gap-px bg-gray-200 rounded-xl overflow-hidden"></div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/client_app.js"></script>
    <script src="/js/client_approvals_calendar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.clientApp && window.clientApp.requireClientAuth) {
                window.clientApp.requireClientAuth();
            }
        });
    </script>
    <div id="client-calendar-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
                <div>
                    <h2 id="client-calendar-modal-title" class="text-lg font-semibold text-gray-900"></h2>
                    <span id="client-calendar-modal-status" class="inline-flex items-center mt-2 px-3 py-1 rounded-full text-xs font-medium"></span>
                </div>
                <button id="client-calendar-modal-close" class="text-gray-400 hover:text-gray-600 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div class="px-6 py-4 space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm text-gray-700">
                    <div>
                        <p class="text-xs uppercase tracking-wide text-gray-400 mb-1">Data</p>
                        <p id="client-calendar-modal-date"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wide text-gray-400 mb-1">Plataforma</p>
                        <p id="client-calendar-modal-platform"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wide text-gray-400 mb-1">Formato</p>
                        <p id="client-calendar-modal-format"></p>
                    </div>
                    <div>
                        <p class="text-xs uppercase tracking-wide text-gray-400 mb-1">Tema</p>
                        <p id="client-calendar-modal-theme"></p>
                    </div>
                </div>
                <div>
                    <p class="text-xs uppercase tracking-wide text-gray-400 mb-1">Legenda</p>
                    <p id="client-calendar-modal-caption" class="text-sm text-gray-700 whitespace-pre-wrap"></p>
                </div>
                <div>
                    <p class="text-xs uppercase tracking-wide text-gray-400 mb-1">Motivo do ajuste</p>
                    <textarea id="client-calendar-modal-reason" rows="3" class="w-full rounded-lg border border-gray-200 bg-white px-3 py-2 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-purple-300" placeholder="Escreva o motivo do ajuste"></textarea>
                </div>
                <div id="client-calendar-modal-media" class="hidden">
                    <p class="text-xs uppercase tracking-wide text-gray-400 mb-2">Mídia</p>
                    <img id="client-calendar-modal-media-img" src="" alt="Mídia do post" class="w-full rounded-xl border border-gray-200">
                </div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex flex-wrap justify-end gap-3">
                <button id="client-calendar-modal-changes" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-700 hover:bg-gray-200 transition">Solicitar Ajustes</button>
                <button id="client-calendar-modal-approve" class="px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">Aprovar Conteúdo</button>
            </div>
        </div>
    </div>
</body>
</html>
