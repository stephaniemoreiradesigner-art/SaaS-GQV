<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprovação de Calendário - Painel do Cliente</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8">
            <img src="assets/logo.png" id="logo-mobile" class="h-8" alt="Logo">
            <button onclick="window.clientApp && window.clientApp.clientLogout()" class="text-sm px-4 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 transition">Sair</button>
        </header>

        <main class="flex-1 px-4 py-10">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Aprovação de Calendário</h1>
                <div class="bg-white border border-gray-200 rounded-xl p-6">
                    <p class="text-sm text-gray-500">Nenhum item pendente por enquanto</p>
                    <div class="mt-4 flex flex-wrap gap-3">
                        <button disabled class="px-4 py-2 rounded-lg bg-gray-100 text-gray-400 cursor-not-allowed">Aprovar</button>
                        <button disabled class="px-4 py-2 rounded-lg bg-gray-100 text-gray-400 cursor-not-allowed">Solicitar ajustes</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/client_app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.clientApp && window.clientApp.requireClientAuth) {
                window.clientApp.requireClientAuth();
            }
        });
    </script>
</body>
</html>
