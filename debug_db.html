<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Debug DB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</head>
<body>
    <h1>Debugging Social Posts Schema</h1>
    <pre id="output">Running...</pre>

    <script>
        const getSupabaseClient = async () => {
            if (window.supabaseClient) return window.supabaseClient;
            if (typeof window.initSupabase === 'function') {
                const ok = await window.initSupabase();
                if (ok && window.supabaseClient) return window.supabaseClient;
            }
            return null;
        };

        async function debug() {
            const out = document.getElementById('output');
            const client = await getSupabaseClient();
            if (!client) {
                out.textContent = 'Erro: Supabase não disponível.';
                return;
            }
            
            // Fetch 1 row to see columns
            const { data, error } = await client
                .from('social_posts')
                .select('*')
                .limit(1);

            if (error) {
                out.textContent = 'Error: ' + JSON.stringify(error, null, 2);
                return;
            }

            if (data && data.length > 0) {
                const keys = Object.keys(data[0]);
                out.textContent = 'Columns found:\n' + keys.join('\n');
            } else {
                out.textContent = 'Table is empty, cannot infer columns from data. Try inserting a dummy row without the problematic column.';
                
                // Try inserting a dummy row with minimal columns to see if it works
                const { error: insertError } = await client
                    .from('social_posts')
                    .insert({ titulo: 'Test', status: 'draft' }); // Guessing minimal fields
                
                if (insertError) {
                     out.textContent += '\n\nInsert Error: ' + JSON.stringify(insertError, null, 2);
                } else {
                     out.textContent += '\n\nDummy row inserted. Now check columns again.';
                }
            }
        }

        debug();
    </script>
</body>
</html>
