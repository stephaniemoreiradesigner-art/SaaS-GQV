<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login do Cliente - Gestão Que Vende</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <img id="logo-sidebar" class="mx-auto h-16 w-auto mb-6 object-contain" src="assets/logo.png" alt="Gestão Que Vende">
            <h1 class="text-2xl font-bold text-gray-900">Acesso do Cliente</h1>
            <p class="mt-2 text-sm text-gray-500">Entre para acessar seu painel</p>
        </div>
        <form class="mt-8 space-y-5" id="client-login-form">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                <input id="email" type="email" class="w-full rounded-lg border border-gray-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="seu@email.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                <input id="password" type="password" class="w-full rounded-lg border border-gray-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary" placeholder="********">
            </div>
            <button id="client-login-button" type="submit" class="w-full bg-primary text-white font-semibold py-2 rounded-lg hover:bg-primary-hover transition">Entrar</button>
        </form>
        <div class="text-center mt-4 pt-4 border-t border-gray-100">
            <a id="client-create-password-link" href="client_register.html" class="text-sm text-gray-600 hover:text-primary transition-colors">
                Ainda não criou sua senha? <span class="font-medium text-primary">Criar minha senha</span>
            </a>
        </div>
    </div>
    <script src="js/client_app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('client-login-form');
            const button = document.getElementById('client-login-button');
            if (!form || !button) return;
            const originalText = button.textContent;

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();

                if (!email || !password) {
                    alert('Preencha e-mail e senha.');
                    return;
                }

                button.disabled = true;
                button.textContent = 'Entrando...';

                try {
                    const supabase = await window.clientApp.getSupabaseClient();
                    if (!supabase) {
                        alert('Não foi possível iniciar o login agora.');
                        return;
                    }

                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) {
                        alert('E-mail ou senha inválidos.');
                        return;
                    }

                    const session = data?.session;
                    if (!session) {
                        alert('Sessão não encontrada.');
                        return;
                    }

                    const { data: profile, error: profileError } = await supabase
                        .from('profiles')
                        .select('role')
                        .eq('id', session.user.id)
                        .single();

                    if (profileError || !profile || profile.role !== 'client') {
                        alert('Acesso restrito ao painel do cliente.');
                        await supabase.auth.signOut();
                        return;
                    }

                    window.location.href = 'client_dashboard.html';
                } catch (err) {
                    alert('Erro ao fazer login. Tente novamente.');
                } finally {
                    button.disabled = false;
                    button.textContent = originalText;
                }
            });

            const createPasswordLink = document.getElementById('client-create-password-link');
            const emailInput = document.getElementById('email');
            if (createPasswordLink && emailInput) {
                createPasswordLink.addEventListener('click', (event) => {
                    event.preventDefault();
                    const emailValue = String(emailInput.value || '').trim().toLowerCase();
                    const targetUrl = emailValue
                        ? `client_register.html?email=${encodeURIComponent(emailValue)}`
                        : 'client_register.html';
                    window.location.href = targetUrl;
                });
            }
        });
    </script>
</body>
</html>
