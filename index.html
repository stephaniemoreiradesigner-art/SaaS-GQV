<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestão Que Vende</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Theme & Tailwind -->
    <script src="js/theme.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <img id="logo-sidebar" class="mx-auto h-20 w-auto mb-6 object-contain" src="assets/logo.png" alt="Gestão Que Vende">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Bem-vindo de volta</h2>
            <p class="mt-2 text-sm text-gray-500">
                Entre para gerenciar seu negócio
            </p>
        </div>
        
        <form class="mt-8 space-y-6" id="loginForm">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400 text-sm"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="seu@email.com">
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="******">
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="text-sm">
                    <a href="forgot_password.html" class="font-medium text-primary hover:text-primary-hover transition-colors">
                        Esqueceu sua senha?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt text-white/70 group-hover:text-white transition-colors"></i>
                    </span>
                    Entrar
                </button>
            </div>
            <div>
                <button id="btn-demo-mode" type="button"
                    class="w-full flex justify-center py-3 px-4 border border-yellow-300 text-sm font-medium rounded-lg text-yellow-800 bg-yellow-100 hover:bg-yellow-200 transition-all shadow-sm">
                    Modo Demonstração
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4 pt-4 border-t border-gray-100">
            <p class="text-sm text-gray-600">
                Não tem uma conta? 
                <a href="cadastro.html" class="font-medium text-primary hover:text-primary-hover transition-colors">
                    Crie agora
                </a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://gbqknmejsmnizjdnopnq.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdicWtubWVqc21uaXpqZG5vcG5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMjkyOTMsImV4cCI6MjA3ODgwNTI5M30.w-v_CW3X5DF9x_nnFe3Lhvw_JyrXxfXKv7tPIZAjGaU';

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Login Script Iniciado');

            // Verificar se é um retorno de recuperação de senha (type=recovery)
            const hash = window.location.hash;
            if (hash && hash.includes('type=recovery')) {
                console.log('Detectado fluxo de recuperação de senha. Redirecionando...');
                window.location.href = 'update_password.html' + hash;
                return;
            }
            
            let supabase;
            try {
                if (window.supabase) {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                } else {
                    console.error('Supabase lib não carregada');
                    alert('Erro de carregamento. Verifique sua conexão.');
                    return;
                }
            } catch (e) {
                console.error('Erro init supabase', e);
            }

            // Verificar sessão existente
            try {
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    console.log('Sessão ativa, redirecionando...');
                    window.location.href = 'dashboard.html';
                    return;
                }
            } catch (err) {
                console.warn('Erro ao verificar sessão:', err);
            }

            const loginForm = document.getElementById('loginForm');
            if (loginForm) {
                loginForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    console.log('Login submit capturado');

                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const btn = loginForm.querySelector('button');
                    const originalContent = btn.innerHTML;

                    try {
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Entrando...';
                        btn.disabled = true;
                        btn.classList.add('opacity-75', 'cursor-not-allowed');

                        const { data, error } = await supabase.auth.signInWithPassword({
                            email: email,
                            password: password
                        });

                        if (error) throw error;

                        console.log('Login Sucesso:', data);
                        
                        if (data.session) {
                            const params = new URLSearchParams();
                            params.append('access_token', data.session.access_token);
                            params.append('refresh_token', data.session.refresh_token);
                            window.location.href = 'dashboard.html?' + params.toString();
                        } else {
                            window.location.href = 'dashboard.html';
                        }

                    } catch (error) {
                        console.error('Erro Login:', error);
                        if (error.message.includes('Email not confirmed')) {
                            alert('Seu e-mail ainda não foi confirmado. Verifique sua caixa de entrada (e spam).');
                        } else if (error.message.includes('Invalid login credentials')) {
                            alert('E-mail ou senha incorretos.');
                        } else {
                            alert('Erro ao entrar: ' + error.message);
                        }
                    } finally {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        btn.classList.remove('opacity-75', 'cursor-not-allowed');
                    }
                });
            }

            const demoButton = document.getElementById('btn-demo-mode');
            if (demoButton) {
                demoButton.addEventListener('click', async () => {
                    const originalText = demoButton.textContent;
                    demoButton.disabled = true;
                    demoButton.textContent = 'Ativando demo...';
                    try {
                        const response = await fetch('/api/demo/seed', { method: 'POST' });
                        if (!response.ok) {
                            alert('Não foi possível ativar o modo demo.');
                            return;
                        }
                        localStorage.setItem('tenant_id', '00000000-0000-0000-0000-000000000999');
                        localStorage.setItem('demo_mode', 'true');
                        window.location.href = 'dashboard.html';
                    } catch (error) {
                        alert('Erro ao ativar o modo demo.');
                    } finally {
                        demoButton.disabled = false;
                        demoButton.textContent = originalText;
                    }
                });
            }
        });
    </script>
</body>
</html>
