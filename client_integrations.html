<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrações - Painel do Cliente</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-4 md:px-8">
            <img src="assets/logo.png" id="logo-mobile" class="h-8" alt="Logo">
            <button onclick="window.clientApp && window.clientApp.clientLogout()" class="text-sm px-4 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50 transition">Sair</button>
        </header>

        <main class="flex-1 px-4 py-10">
            <div class="max-w-4xl mx-auto">
                <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">Integrações</h1>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition">
                        <h2 class="text-lg font-semibold text-gray-800">Meta</h2>
                        <p class="text-sm text-gray-500 mt-1">Status: não conectado</p>
                        <button class="mt-4 px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">Conectar</button>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition">
                        <h2 class="text-lg font-semibold text-gray-800">Google Ads</h2>
                        <p class="text-sm text-gray-500 mt-1">Status: não conectado</p>
                        <button class="mt-4 px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">Conectar</button>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition">
                        <h2 class="text-lg font-semibold text-gray-800">LinkedIn Ads</h2>
                        <p class="text-sm text-gray-500 mt-1">Status: não conectado</p>
                        <button class="mt-4 px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">Conectar</button>
                    </div>
                    <div class="bg-white border border-gray-200 rounded-xl p-6 hover:shadow-md transition">
                        <h2 class="text-lg font-semibold text-gray-800">TikTok Ads</h2>
                        <p class="text-sm text-gray-500 mt-1">Status: não conectado</p>
                        <button class="mt-4 px-4 py-2 rounded-lg bg-primary text-white hover:bg-primary-hover transition">Conectar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/client_app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.clientApp && window.clientApp.requireClientAuth) {
                window.clientApp.requireClientAuth();
            }
        });
    </script>
</body>
</html>
