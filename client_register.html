<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Cliente - Gestão Que Vende</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <script src="js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <img id="logo-sidebar" class="mx-auto h-20 w-auto mb-6 object-contain" src="assets/logo.png" alt="Gestão Que Vende">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Criar acesso ao Painel do Cliente</h2>
            <p class="mt-2 text-sm text-gray-500">
                Crie sua senha para acessar o painel
            </p>
        </div>
        
        <form class="mt-8 space-y-6" id="client-register-form">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400 text-sm"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="seu@email.com">
                    </div>
                    <p id="email-invite-note" class="text-xs text-gray-500 mt-2 hidden">E-mail preenchido a partir do convite. Para trocar, fale com o administrador.</p>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="password" name="password" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="Repita a senha">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-user-plus text-white/70 group-hover:text-white transition-colors"></i>
                    </span>
                    Criar acesso
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4 pt-4 border-t border-gray-100">
            <p class="text-sm text-gray-600">
                Já tem uma conta? 
                <a href="client_login.html" class="font-medium text-primary hover:text-primary-hover transition-colors">
                    Faça Login
                </a>
            </p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('client-register-form');
            if (!form) return;
            const emailInputElement = document.getElementById('email');
            const inviteNote = document.getElementById('email-invite-note');
            const params = new URLSearchParams(window.location.search);
            const inviteEmail = String(params.get('email') || '').trim().toLowerCase();
            if (inviteEmail && emailInputElement) {
                emailInputElement.value = inviteEmail;
                emailInputElement.readOnly = true;
                emailInputElement.classList.add('bg-gray-100');
                if (inviteNote) inviteNote.classList.remove('hidden');
            }
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const emailInput = document.getElementById('email').value;
                const email = String(emailInput || '').trim().toLowerCase();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const btn = form.querySelector('button');
                const originalContent = btn.innerHTML;

                if (!email) {
                    alert('Informe um e-mail válido.');
                    return;
                }

                if (password !== confirmPassword) {
                    alert('As senhas não conferem!');
                    return;
                }

                try {
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processando...';
                    btn.disabled = true;
                    btn.classList.add('opacity-75', 'cursor-not-allowed');

                    const response = await fetch('/api/auth/register-invite', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password, kind: 'client' })
                    });

                    const payload = await response.json().catch(() => null);
                    if (response.ok && payload && payload.ok) {
                        alert('Conta criada! Faça login.');
                        window.location.href = 'client_login.html';
                        return;
                    }

                    if (payload?.error === 'not_invited') {
                        alert('E-mail não encontrado na base de convites. Peça ao Administrador para cadastrar seu e-mail antes de criar a senha.');
                        return;
                    }

                    if (payload?.error === 'user_exists') {
                        alert('Usuário já existe. Faça login.');
                        return;
                    }

                    alert('Erro ao criar conta. Tente novamente.');
                } catch (error) {
                    alert('Erro ao criar conta. Tente novamente.');
                } finally {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                }
            });
        });
    </script>
</body>
</html>
