<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Gestão Que Vende</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Theme & Tailwind -->
    <script src="js/theme.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <img id="logo-sidebar" class="mx-auto h-20 w-auto mb-6 object-contain" src="assets/logo.png" alt="Gestão Que Vende">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Nova Senha</h2>
            <p class="mt-2 text-sm text-gray-500">
                Digite sua nova senha abaixo
            </p>
        </div>
        
        <form class="mt-8 space-y-6" id="updatePasswordForm">
            <div class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Nova Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="password" name="password" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmar Nova Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-gray-400 text-sm"></i>
                        </div>
                        <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="Repita a senha">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-save text-white/70 group-hover:text-white transition-colors"></i>
                    </span>
                    Redefinir Senha
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Update Password Script Iniciado');
            
            const waitForSupabaseClient = () => new Promise((resolve) => {
                if (window.supabaseClient) return resolve(window.supabaseClient);
                const handler = () => {
                    if (window.supabaseClient) {
                        window.removeEventListener('supabaseReady', handler);
                        resolve(window.supabaseClient);
                    }
                };
                window.addEventListener('supabaseReady', handler);
                setTimeout(() => {
                    window.removeEventListener('supabaseReady', handler);
                    resolve(null);
                }, 10000);
            });

            const supabase = await waitForSupabaseClient();
            if (!supabase) {
                console.error('Supabase client não inicializado em update_password.html');
                alert('Erro ao carregar autenticação. Tente novamente.');
                return;
            }

            // Verificar se temos o hash/token de recuperação na URL (Supabase usa #access_token=...&type=recovery ou similar)
            // Na verdade, o supabase redireciona com os tokens. Precisamos setar a sessão.
            // O evento onAuthStateChange deve pegar isso se usarmos supabase.auth.onAuthStateChange,
            // mas como é uma página simples, vamos tentar pegar da URL.
            
            // Tenta pegar o hash da URL para configurar a sessão
            /*
            Supabase reset password flow:
            1. User clicks email link -> Redirects to Site URL + #access_token=...&type=recovery...
            2. App should detect this and set session.
            */

            const updatePasswordForm = document.getElementById('updatePasswordForm');
            
            // Tenta recuperar sessão da URL
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                // Supabase JS client handles this automatically usually if on the same domain?
                // Vamos forçar a detecção
                const { data: { session }, error } = await supabase.auth.getSession();
                if (!session) {
                    // Se não tem sessão, tenta pegar do hash manualmente se a lib não pegou
                     // Mas normalmente a lib pega. Se não pegou, pode ser que o usuário não clicou no link corretamente.
                }
            }

            // Monitorar estado de auth para garantir que o usuário está "logado" (modo recovery)
            supabase.auth.onAuthStateChange(async (event, session) => {
                console.log('Auth State Change:', event);
                if (event === 'PASSWORD_RECOVERY') {
                    // Estamos no modo de recuperação
                    console.log('Modo de recuperação de senha detectado');
                }
            });

            if (updatePasswordForm) {
                updatePasswordForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;
                    const btn = updatePasswordForm.querySelector('button');
                    const originalContent = btn.innerHTML;

                    if (password !== confirmPassword) {
                        alert('As senhas não conferem!');
                        return;
                    }

                    try {
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Salvando...';
                        btn.disabled = true;
                        btn.classList.add('opacity-75', 'cursor-not-allowed');

                        const { data, error } = await supabase.auth.updateUser({
                            password: password
                        });

                        if (error) throw error;

                        alert('Senha redefinida com sucesso! Você será redirecionado para o login.');
                        await supabase.auth.signOut();
                        window.location.href = 'index.html';

                    } catch (error) {
                        console.error('Erro ao redefinir senha:', error);
                        alert('Erro ao redefinir senha: ' + error.message);
                    } finally {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        btn.classList.remove('opacity-75', 'cursor-not-allowed');
                    }
                });
            }
        });
    </script>
</body>
</html>
