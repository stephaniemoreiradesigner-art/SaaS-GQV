<div class="card">
    <div class="toolbar">
        <div>
            <h2>Dashboard do Cliente</h2>
            <p class="list-subtitle">Acompanhamento dos conteúdos e mídia</p>
        </div>
        <div class="toolbar-actions">
            <button class="btn btn-primary btn-sm" data-action="baixar-boleto">Baixar boleto</button>
        </div>
    </div>
    <div class="grid grid-4" style="margin-top: 20px;">
        <div class="metric-card">
            <span class="metric-label">Calendário para aprovação</span>
            <span class="metric-value" data-client="calendario">0</span>
        </div>
        <div class="metric-card">
            <span class="metric-label">Posts para aprovação</span>
            <span class="metric-value" data-client="posts">0</span>
        </div>
        <div class="metric-card">
            <span class="metric-label">Campanhas ativas</span>
            <span class="metric-value" data-client="campanhas">0</span>
        </div>
        <div class="metric-card">
            <span class="metric-label">Próxima fatura em</span>
            <span class="metric-value"><span data-client="fatura">0</span> dias</span>
        </div>
    </div>
</div>
<div class="card">
    <h3 class="section-title">Hub de atalhos</h3>
    <div class="grid grid-2" id="client-shortcuts"></div>
</div>
