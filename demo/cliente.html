<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Cliente - SaaS GQV</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/demo.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar client-sidebar">
            <div class="sidebar-header">
                <img src="../assets/logo.png" alt="Logo">
            </div>
            <ul class="client-menu">
                <li><a href="#/dashboard" data-route="dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#/calendario" data-route="calendario"><i class="fas fa-calendar"></i> Calendário</a></li>
                <li><a href="#/posts" data-route="posts"><i class="fas fa-file-alt"></i> Posts</a></li>
                <li><a href="#/campanhas" data-route="campanhas"><i class="fas fa-bullhorn"></i> Solicitar campanha</a></li>
                <li><a href="#/insights" data-route="insights"><i class="fas fa-chart-line"></i> Insights</a></li>
                <li><a href="#/financeiro" data-route="financeiro"><i class="fas fa-wallet"></i> Financeiro</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-profile-container">
                    <img class="user-avatar-sidebar" src="assets/user.png" alt="Usuário">
                    <span class="user-name-sidebar">Cliente Demo</span>
                </div>
                <button class="btn-logout-sidebar" title="Sair">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>
        <main class="main-content">
            <header class="demo-topbar">
                <div class="demo-topbar-left">
                    <h1 class="demo-title">Painel do Cliente</h1>
                    <span class="demo-subtitle">Aprovações e acompanhamento</span>
                </div>
                <div class="demo-topbar-actions">
                    <a href="index.html" class="btn btn-sm"><i class="fas fa-arrow-left"></i> Voltar agência</a>
                </div>
            </header>
            <section class="content-area">
                <div id="app"></div>
            </section>
        </main>
    </div>

    <script>
        window.demoRouterConfig = {
            routes: {
                dashboard: 'cliente-pages/dashboard.html',
                calendario: 'cliente-pages/calendario.html',
                posts: 'cliente-pages/posts.html',
                campanhas: 'cliente-pages/campanhas.html',
                insights: 'cliente-pages/insights.html',
                financeiro: 'cliente-pages/financeiro.html'
            },
            defaultRoute: 'dashboard',
            linkSelector: '.client-menu a',
            activeClass: 'active'
        };
    </script>
    <script src="js/mock-data.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Fallback para imagens
        document.addEventListener('DOMContentLoaded', () => {
            const logos = document.querySelectorAll('img[src*="logo"]');
            logos.forEach(img => {
                img.onerror = () => {
                    img.style.display = 'none';
                    const fallback = document.createElement('div');
                    fallback.className = 'logo-fallback';
                    fallback.innerHTML = '<span>SaaS</span> GQV';
                    img.parentNode.insertBefore(fallback, img);
                };
            });

            const avatars = document.querySelectorAll('img[src*="user"]');
            avatars.forEach(img => {
                img.onerror = () => {
                    img.style.display = 'none';
                    const fallback = document.createElement('div');
                    fallback.className = 'avatar-fallback';
                    fallback.innerText = 'C';
                    img.parentNode.insertBefore(fallback, img);
                };
            });
        });
    </script>
</body>
</html>
