<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Cliente - Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <div id="client-content" class="min-h-screen opacity-0 transition-opacity duration-200">
        <div id="client-sidebar-overlay" class="fixed inset-0 bg-black/40 hidden md:hidden z-20"></div>
        <div class="flex min-h-screen">
            <aside id="client-sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-gray-200 z-30 transform -translate-x-full md:translate-x-0 md:static transition-transform duration-200">
                <div class="h-16 flex items-center gap-3 px-5 border-b border-gray-100">
                    <div class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center">
                        <i class="fas fa-building"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Cliente</p>
                        <p class="text-sm font-semibold" data-client-name>Cliente</p>
                    </div>
                </div>
                <nav id="client-nav" class="p-4 space-y-2 text-sm"></nav>
            </aside>

            <div class="flex-1 flex flex-col min-h-screen">
                <header class="sticky top-0 z-10 bg-white border-b border-gray-100">
                    <div class="flex items-center justify-between px-4 md:px-8 py-4">
                        <div class="flex items-center gap-3">
                            <button id="client-menu-toggle" class="md:hidden w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500">
                                <i class="fas fa-bars"></i>
                            </button>
                            <div>
                                <h1 class="text-lg font-bold">Performance (MVP)</h1>
                                <p class="text-sm text-gray-500">Olá, <span data-client-name>Cliente</span></p>
                            </div>
                        </div>
                        <button id="client-logout" class="text-sm px-4 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">
                            Sair
                        </button>
                    </div>
                </header>

                <main class="flex-1 px-4 md:px-8 py-6">
                    <div class="grid gap-4 md:grid-cols-3">
                        <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
                            <div class="flex items-center gap-3 text-primary">
                                <i class="fas fa-coins text-xl"></i>
                                <h2 class="text-sm font-semibold">Gastos</h2>
                            </div>
                            <p class="text-2xl font-bold mt-4">R$ 0</p>
                            <p class="text-sm text-gray-500 mt-1">Últimos 30 dias</p>
                        </div>
                        <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
                            <div class="flex items-center gap-3 text-primary">
                                <i class="fas fa-user-plus text-xl"></i>
                                <h2 class="text-sm font-semibold">Leads</h2>
                            </div>
                            <p class="text-2xl font-bold mt-4">0</p>
                            <p class="text-sm text-gray-500 mt-1">Últimos 30 dias</p>
                        </div>
                        <div class="bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
                            <div class="flex items-center gap-3 text-primary">
                                <i class="fas fa-bullseye text-xl"></i>
                                <h2 class="text-sm font-semibold">CPA</h2>
                            </div>
                            <p class="text-2xl font-bold mt-4">R$ 0</p>
                            <p class="text-sm text-gray-500 mt-1">Últimos 30 dias</p>
                        </div>
                    </div>

                    <div class="mt-6 bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
                        <div class="flex items-center gap-3 text-primary">
                            <i class="fas fa-link text-xl"></i>
                            <h2 class="text-lg font-semibold">Conecte uma integração</h2>
                        </div>
                        <p class="text-sm text-gray-500 mt-2">Conecte uma integração para visualizar dados.</p>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script src="/js/client_session.js"></script>
    <script src="/js/client_portal.js"></script>
</body>
</html>
