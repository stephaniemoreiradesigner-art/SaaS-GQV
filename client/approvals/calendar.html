<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=/client/approvals/calendar">
    <script>window.location.replace('/client/approvals/calendar');</script>
    <title>Painel do Cliente - Aprovações Calendário</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <div id="client-content" class="min-h-screen opacity-0 transition-opacity duration-200">
        <div id="client-sidebar-overlay" class="fixed inset-0 bg-black/40 hidden md:hidden z-20"></div>
        <div class="flex min-h-screen">
            <aside id="client-sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-gray-200 z-30 transform -translate-x-full md:translate-x-0 md:static transition-transform duration-200">
                <div class="h-16 flex items-center gap-3 px-5 border-b border-gray-100">
                    <div class="w-9 h-9 rounded-full bg-primary/10 text-primary flex items-center justify-center">
                        <i class="fas fa-building"></i>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Cliente</p>
                        <p class="text-sm font-semibold" data-client-name>Cliente</p>
                    </div>
                </div>
                <nav class="p-4 space-y-2 text-sm">
                    <a href="/client" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                        <i class="fas fa-grid-2"></i> Dashboard
                    </a>
                    <a href="/client/metrics" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                        <i class="fas fa-chart-line"></i> Métricas
                    </a>
                    <a href="/client/integrations" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                        <i class="fas fa-plug"></i> Integrações
                    </a>
                    <div class="mt-4 text-xs uppercase text-gray-400 px-3">Aprovações</div>
                    <a href="/client/approvals/calendar" class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary font-semibold">
                        <i class="fas fa-calendar"></i> Calendário
                    </a>
                    <a href="/client/approvals/posts" class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50">
                        <i class="fas fa-clapperboard"></i> Posts
                    </a>
                </nav>
            </aside>

            <div class="flex-1 flex flex-col min-h-screen">
                <header class="sticky top-0 z-10 bg-white border-b border-gray-100">
                    <div class="flex items-center justify-between px-4 md:px-8 py-4">
                        <div class="flex items-center gap-3">
                            <button id="client-menu-toggle" class="md:hidden w-10 h-10 rounded-lg border border-gray-200 flex items-center justify-center text-gray-500">
                                <i class="fas fa-bars"></i>
                            </button>
                            <div>
                                <h1 class="text-lg font-bold">Aprovações - Calendário</h1>
                                <p class="text-sm text-gray-500">Olá, <span data-client-name>Cliente</span></p>
                            </div>
                        </div>
                        <button id="client-logout" class="text-sm px-4 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-50">
                            Sair
                        </button>
                    </div>
                </header>

                <main class="flex-1 px-4 md:px-8 py-6">
                    <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
                        <h2 class="text-lg font-semibold">Calendário de Aprovações</h2>
                        <p class="text-sm text-gray-500 mt-2">Nenhum item pendente por enquanto</p>
                        <div class="mt-4 flex flex-wrap gap-3">
                            <button disabled class="px-4 py-2 rounded-lg bg-gray-100 text-gray-400 cursor-not-allowed">Aprovar</button>
                            <button disabled class="px-4 py-2 rounded-lg bg-gray-100 text-gray-400 cursor-not-allowed">Solicitar ajuste</button>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>
    <script src="/js/client_portal.js"></script>
</body>
</html>
