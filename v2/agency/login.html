<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agency V2 - Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4 font-sans text-slate-900">
    <div class="w-full max-w-md bg-white border border-slate-200 rounded-2xl shadow-xl p-8">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-12 h-12 rounded-xl bg-primary/10 text-primary flex items-center justify-center">
                <i class="fas fa-shield-alt"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold">Agency App V2</h1>
                <p class="text-sm text-slate-500">Acesso interno da equipe</p>
            </div>
        </div>
        <form id="agency-login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input id="email" type="email" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="seu@email.com" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input id="password" type="password" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="********" required>
            </div>
            <button id="login-button" type="submit" class="w-full bg-slate-900 text-white font-semibold py-2 rounded-lg hover:bg-slate-800 transition">Entrar</button>
        </form>
        <div class="text-center mt-4 pt-4 border-t border-slate-100">
            <a href="/v2/client/login.html" class="text-sm text-slate-500 hover:text-primary transition-colors">
                Sou cliente
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/app.js"></script>
    <script>
        const getSupabase = async () => {
            if (window.supabaseClient) return window.supabaseClient;
            if (typeof window.initSupabase === 'function') {
                const ok = await window.initSupabase();
                if (ok && window.supabaseClient) return window.supabaseClient;
            }
            return window.supabaseClient || null;
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const supabase = await getSupabase();
            if (supabase?.auth?.getSession) {
                const { data } = await supabase.auth.getSession();
                if (data?.session) {
                    window.location.href = '/v2/agency/index.html';
                    return;
                }
            }

            const form = document.getElementById('agency-login-form');
            const button = document.getElementById('login-button');
            if (!form || !button) return;
            const originalText = button.textContent;

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                if (!email || !password) {
                    alert('Preencha e-mail e senha.');
                    return;
                }
                button.disabled = true;
                button.textContent = 'Entrando...';
                try {
                    const client = await getSupabase();
                    if (!client) {
                        alert('Falha ao conectar.');
                        return;
                    }
                    const { error } = await client.auth.signInWithPassword({ email, password });
                    if (error) {
                        alert('Falha no login.');
                        return;
                    }
                    window.location.href = '/v2/agency/index.html';
                } finally {
                    button.disabled = false;
                    button.textContent = originalText;
                }
            });
        });
    </script>
</body>
</html>
