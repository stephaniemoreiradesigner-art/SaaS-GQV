<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente V2 - Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100 py-12 px-4 font-sans text-slate-900">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center">
            <img class="mx-auto h-16 w-auto mb-6 object-contain" src="/assets/logo.png" alt="Gestão Que Vende">
            <h1 class="text-2xl font-bold text-slate-900">Portal do Cliente V2</h1>
            <p class="mt-2 text-sm text-slate-500">Acesse seu painel exclusivo</p>
        </div>
        <form class="mt-8 space-y-5" id="client-login-form">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input id="email" type="email" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input id="password" type="password" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="********">
            </div>
            <button id="client-login-button" type="submit" class="w-full bg-slate-900 text-white font-semibold py-2 rounded-lg hover:bg-slate-800 transition">Entrar</button>
        </form>
        <div class="text-center mt-4 pt-4 border-t border-slate-100 space-y-2">
            <a id="client-create-password-link" href="/v2/client/register.html" class="block text-sm text-slate-600 hover:text-primary transition-colors">
                Primeiro acesso? <span class="font-medium text-primary">Criar minha senha</span>
            </a>
            <a href="/v2/client/forgot.html" class="block text-sm text-slate-500 hover:text-primary transition-colors">
                Esqueci minha senha
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/app.js"></script>
    <script>
        const ensureSupabaseClient = async () => {
            if (window.supabaseClient) return window.supabaseClient;
            if (typeof window.initSupabase === 'function') {
                const ok = await window.initSupabase();
                if (ok && window.supabaseClient) return window.supabaseClient;
            }
            if (window.supabase && window.supabaseConfig?.supabaseUrl && window.supabaseConfig?.supabaseAnonKey) {
                window.supabaseClient = window.supabase.createClient(
                    window.supabaseConfig.supabaseUrl,
                    window.supabaseConfig.supabaseAnonKey
                );
                return window.supabaseClient;
            }
            return null;
        };

        const getFriendlyLoginError = (error) => {
            const message = String(error?.message || '');
            if (message === 'Invalid login credentials') return 'E-mail ou senha incorretos.';
            if (message === 'Email not confirmed') return 'Seu e-mail ainda não foi confirmado.';
            if (message === 'User not found') return 'Usuário não encontrado.';
            return 'Falha ao iniciar login.';
        };

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('client-login-form');
            const button = document.getElementById('client-login-button');
            if (!form || !button) return;
            const originalText = button.textContent;

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                if (!email || !password) {
                    alert('Preencha e-mail e senha.');
                    return;
                }

                button.disabled = true;
                button.textContent = 'Entrando...';

                try {
                    const supabase = await ensureSupabaseClient();
                    if (!supabase) {
                        alert('Falha ao iniciar login.');
                        return;
                    }

                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) {
                        alert(getFriendlyLoginError(error));
                        return;
                    }
                    const session = data?.session;
                    if (!session) {
                        alert('Sessão não encontrada.');
                        return;
                    }
                    window.location.href = '/v2/client/index.html';
                } finally {
                    button.disabled = false;
                    button.textContent = originalText;
                }
            });

            const createPasswordLink = document.getElementById('client-create-password-link');
            const emailInput = document.getElementById('email');
            if (createPasswordLink && emailInput) {
                createPasswordLink.addEventListener('click', (event) => {
                    event.preventDefault();
                    const emailValue = String(emailInput.value || '').trim().toLowerCase();
                    const targetUrl = emailValue
                        ? `/v2/client/register.html?email=${encodeURIComponent(emailValue)}`
                        : '/v2/client/register.html';
                    window.location.href = targetUrl;
                });
            }
        });
    </script>
</body>
</html>
