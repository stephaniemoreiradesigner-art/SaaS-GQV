<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente V2 - Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100 py-12 px-4 font-sans text-slate-900">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center">
            <img class="mx-auto h-16 w-auto mb-6 object-contain" src="/assets/logo.png" alt="Gestão Que Vende">
            <h1 class="text-2xl font-bold text-slate-900">Portal do Cliente V2</h1>
            <p class="mt-2 text-sm text-slate-500">Acesse seu painel exclusivo</p>
        </div>
        <form class="mt-8 space-y-5" id="client-login-form">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input id="email" type="email" autocomplete="username" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input id="password" type="password" autocomplete="current-password" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="********">
            </div>
            <button id="client-login-button" type="submit" class="w-full bg-slate-900 text-white font-semibold py-2 rounded-lg hover:bg-slate-800 transition">Entrar</button>
        </form>
        <div class="text-center mt-4 pt-4 border-t border-slate-100 space-y-2">
            <a id="client-create-password-link" href="/v2/client/register.html" class="block text-sm text-slate-600 hover:text-primary transition-colors">
                Primeiro acesso? <span class="font-medium text-primary">Criar minha senha</span>
            </a>
            <a href="/v2/client/forgot.html" class="block text-sm text-slate-500 hover:text-primary transition-colors">
                Esqueci minha senha
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/app.js"></script>
    <script src="/js/v2/client/client_auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('client-login-form');
            const button = document.getElementById('client-login-button');
            
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    console.log('[LOGIN] Tentativa de login iniciada...');
                    
                    const emailInput = document.getElementById('email');
                    const passwordInput = document.getElementById('password');
                    
                    if (!emailInput || !passwordInput) {
                        console.error('[LOGIN] Campos de email ou senha não encontrados');
                        return;
                    }
                    
                    const email = emailInput.value.trim();
                    const password = passwordInput.value.trim();
                    
                    console.log('[LOGIN] E-mail:', email);

                    if (!email || !password) {
                        alert('Preencha todos os campos.');
                        return;
                    }

                    const originalText = button.textContent;
                    button.disabled = true;
                    button.textContent = 'Entrando...';

                    try {
                        // Garantir que ClientAuth está disponível
                        if (!window.ClientAuth) {
                            throw new Error('Módulo de autenticação não carregado. Recarregue a página.');
                        }

                        const result = await window.ClientAuth.login(email, password);
                        
                        console.log('[LOGIN] Resultado:', result);

                        if (result.success) {
                            console.log('[LOGIN] Sucesso! Redirecionando...');
                            window.location.href = '/v2/client/index.html';
                        } else {
                            console.error('[LOGIN] Erro:', result.error);
                            alert(result.error);
                            button.disabled = false;
                            button.textContent = originalText;
                        }
                    } catch (err) {
                        console.error('[LOGIN] Erro inesperado:', err);
                        alert('Erro inesperado: ' + err.message);
                        button.disabled = false;
                        button.textContent = originalText;
                    }
                });
            } else {
                console.error('[LOGIN] Formulário #client-login-form não encontrado!');
            }
        });
    </script>
</body>
</html>
