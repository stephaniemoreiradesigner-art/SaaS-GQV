<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente V2 - Login</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100 py-12 px-4 font-sans text-slate-900">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center">
            <img class="mx-auto h-16 w-auto mb-6 object-contain" src="/assets/logo.png" alt="Gestão Que Vende">
            <h1 class="text-2xl font-bold text-slate-900">Portal do Cliente V2</h1>
            <p class="mt-2 text-sm text-slate-500">Acesse seu painel exclusivo</p>
        </div>
        <form class="mt-8 space-y-5" id="client-login-form">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                <input id="email" type="email" autocomplete="username" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                <input id="password" type="password" autocomplete="current-password" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="********">
            </div>
            <button id="client-login-button" type="submit" class="w-full bg-slate-900 text-white font-semibold py-2 rounded-lg hover:bg-slate-800 transition">Entrar</button>
            <div id="client-login-feedback" class="hidden text-sm rounded-lg px-3 py-2"></div>
        </form>
        <div class="text-center mt-4 pt-4 border-t border-slate-100 space-y-2">
            <a id="client-create-password-link" href="/v2/client/register.html" class="block text-sm text-slate-600 hover:text-primary transition-colors">
                Primeiro acesso? <span class="font-medium text-primary">Criar minha senha</span>
            </a>
            <a href="/v2/client/forgot.html" class="block text-sm text-slate-500 hover:text-primary transition-colors">
                Esqueci minha senha
            </a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/v2/core/supabase.js"></script>
    <script src="/js/v2/client/client_auth.js"></script>
    <script src="/js/v2/shared/auth_guard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('client-login-form');
            const button = document.getElementById('client-login-button');
            const feedback = document.getElementById('client-login-feedback');

            const setFeedback = (message, type = 'error') => {
                if (!feedback) return;
                feedback.textContent = message;
                feedback.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border', 'border-red-100', 'bg-amber-50', 'text-amber-800', 'border-amber-100', 'bg-green-50', 'text-green-700', 'border-green-100');
                if (type === 'success') {
                    feedback.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-100');
                } else if (type === 'warn') {
                    feedback.classList.add('bg-amber-50', 'text-amber-800', 'border', 'border-amber-100');
                } else {
                    feedback.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-100');
                }
            };

            const params = new URLSearchParams(window.location.search);
            const errorCode = params.get('error');
            if (errorCode) {
                const map = {
                    portal_link_missing: 'Seu usuário do portal não está vinculado a nenhum cliente. Solicite um convite com client_id.',
                    portal_link_query_error: 'Não foi possível validar o vínculo do seu usuário. Tente novamente.',
                    no_email: 'Não foi possível identificar seu e-mail na sessão. Faça login novamente.',
                    ensure_missing: 'Não foi possível validar seu contexto. Faça login novamente.',
                    client_context_error: 'Não foi possível validar seu contexto. Faça login novamente.'
                };
                setFeedback(map[errorCode] || 'Falha ao validar seu acesso. Faça login novamente.', 'warn');
            }

            // [CLIENT_PORTAL_LOGIN] Logs de debug para verificar inicialização
            console.log('[CLIENT_PORTAL_LOGIN] script carregado');
            if (form) console.log('[CLIENT_PORTAL_LOGIN] form encontrado');
            else console.error('[CLIENT_PORTAL_LOGIN] ERRO: form não encontrado');

            const tryHydrateAndRedirect = async () => {
                if (!window.ClientAuth) return;
                await window.ClientAuth.init();
                if (!window.clientPortalSupabase) return;
                const { data } = await window.clientPortalSupabase.auth.getSession();
                if (!data?.session) return;
                if (!window.ClientAuth.ensurePortalSession) return;
                const ensured = await window.ClientAuth.ensurePortalSession();
                if (ensured.ok) {
                    window.location.href = '/v2/client/index.html';
                    return;
                }
                const map = {
                    portal_link_missing: 'Seu usuário do portal não está vinculado a nenhum cliente. Solicite um convite com client_id.'
                };
                setFeedback(map[ensured.reason] || 'Não foi possível validar seu acesso. Faça login novamente.', 'warn');
            };

            tryHydrateAndRedirect();

            if (form) {
                // Remover listeners antigos (caso existam, embora em page load seja raro)
                // Usando uma abordagem limpa de addEventListener
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    console.log('[CLIENT_PORTAL_LOGIN] submit capturado');
                    
                    const emailInput = document.getElementById('email');
                    const passwordInput = document.getElementById('password');
                    
                    if (!emailInput || !passwordInput) {
                        console.error('[CLIENT_PORTAL_LOGIN] Campos de email ou senha não encontrados');
                        return;
                    }
                    
                    const email = emailInput.value.trim();
                    const password = passwordInput.value.trim();
                    
                    console.log('[CLIENT_PORTAL_LOGIN] E-mail:', email);
                    console.log('[CLIENT_PORTAL_LOGIN] login iniciado');

                    if (!email || !password) {
                        setFeedback('Preencha todos os campos.', 'error');
                        return;
                    }

                    const originalText = button.textContent;
                    button.disabled = true;
                    button.textContent = 'Entrando...';

                    try {
                        // Garantir que ClientAuth está disponível
                        if (!window.ClientAuth) {
                            throw new Error('Módulo de autenticação não carregado. Recarregue a página.');
                        }
                        
                        console.log('[CLIENT_PORTAL_LOGIN] Chamando ClientAuth.login()...');
                        const result = await window.ClientAuth.login(email, password);
                        
                        console.log('[CLIENT_PORTAL_LOGIN] Resultado:', result);

                        if (result.success) {
                            console.log('[CLIENT_PORTAL_LOGIN] Sucesso! Redirecionando...');
                            // O redirect é feito pelo client_auth.js agora
                        } else {
                            console.error('[CLIENT_PORTAL_LOGIN] Erro:', result.error);
                            setFeedback(result.error || 'Não foi possível fazer login.', 'error');
                            button.disabled = false;
                            button.textContent = originalText;
                        }
                    } catch (err) {
                        console.error('[CLIENT_PORTAL_LOGIN] Erro inesperado:', err);
                        setFeedback(err.message ? `Erro inesperado: ${err.message}` : 'Erro inesperado no login.', 'error');
                        button.disabled = false;
                        button.textContent = originalText;
                    }
                });
            } else {
                console.error('[CLIENT_PORTAL_LOGIN] Formulário #client-login-form não encontrado!');
            }
        });
    </script>
</body>
</html>
