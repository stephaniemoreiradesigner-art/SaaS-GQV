<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente V2 - Redefinir Senha</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100 py-12 px-4 font-sans text-slate-900">
    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center">
            <img class="mx-auto h-16 w-auto mb-6 object-contain" src="/assets/logo.png" alt="Gestão Que Vende">
            <h1 class="text-2xl font-bold text-slate-900">Redefinir Senha</h1>
            <p class="mt-2 text-sm text-slate-500">Defina uma nova senha de acesso</p>
        </div>

        <div id="reset-feedback" class="hidden mt-6 text-sm rounded-lg px-3 py-2"></div>

        <form class="mt-6 space-y-5" id="client-reset-form">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nova senha</label>
                <input id="password" type="password" autocomplete="new-password" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Confirmar senha</label>
                <input id="confirmPassword" type="password" autocomplete="new-password" class="w-full rounded-lg border border-slate-200 px-4 py-2 focus:outline-none focus:ring-2 focus:ring-primary bg-white" placeholder="Repita a senha" required minlength="6">
            </div>
            <button id="client-reset-button" type="submit" class="w-full bg-slate-900 text-white font-semibold py-2 rounded-lg hover:bg-slate-800 transition">Salvar nova senha</button>
        </form>

        <div class="text-center mt-4 pt-4 border-t border-slate-100">
            <a href="/v2/client/login.html" class="text-sm text-slate-600 hover:text-primary transition-colors">Voltar ao login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/v2/core/supabase.js"></script>
    <script>
        const setFeedback = (message, type = 'error') => {
            const feedback = document.getElementById('reset-feedback');
            if (!feedback) return;
            feedback.textContent = message;
            feedback.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border', 'border-red-100', 'bg-amber-50', 'text-amber-800', 'border-amber-100', 'bg-green-50', 'text-green-700', 'border-green-100');
            if (type === 'success') {
                feedback.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-100');
            } else if (type === 'warn') {
                feedback.classList.add('bg-amber-50', 'text-amber-800', 'border', 'border-amber-100');
            } else {
                feedback.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-100');
            }
            feedback.classList.remove('hidden');
        };

        const ensureClientPortalSupabase = async () => {
            if (window.SupabaseFactory?.getClientPortalClient) {
                return await window.SupabaseFactory.getClientPortalClient();
            }
            return null;
        };

        const parseRecoveryTokens = () => {
            const search = new URLSearchParams(window.location.search);
            const hashStr = window.location.hash ? window.location.hash.replace(/^#/, '') : '';
            const hash = new URLSearchParams(hashStr);

            const access_token = search.get('access_token') || hash.get('access_token') || null;
            const refresh_token = search.get('refresh_token') || hash.get('refresh_token') || null;
            const code = search.get('code') || null;
            const type = search.get('type') || hash.get('type') || null;

            return { access_token, refresh_token, code, type };
        };

        const ensureRecoverySession = async (supabase) => {
            const tokens = parseRecoveryTokens();

            if (tokens.code) {
                try {
                    const { error } = await supabase.auth.exchangeCodeForSession(window.location.href);
                    if (!error) return { ok: true, mode: 'code' };
                } catch {}
            }

            if (tokens.access_token && tokens.refresh_token) {
                try {
                    const { error } = await supabase.auth.setSession({
                        access_token: tokens.access_token,
                        refresh_token: tokens.refresh_token
                    });
                    if (!error) return { ok: true, mode: 'tokens' };
                } catch {}
            }

            const { data } = await supabase.auth.getSession();
            if (data?.session) return { ok: true, mode: 'existing' };
            return { ok: false };
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const form = document.getElementById('client-reset-form');
            const button = document.getElementById('client-reset-button');
            if (!form || !button) return;
            const originalText = button.textContent;

            const supabase = await ensureClientPortalSupabase();
            if (!supabase) {
                setFeedback('Falha ao iniciar.', 'error');
                button.disabled = true;
                return;
            }

            const ensured = await ensureRecoverySession(supabase);
            if (!ensured.ok) {
                setFeedback('Link de recuperação inválido ou expirado. Solicite um novo link.', 'warn');
            }

            form.addEventListener('submit', async (event) => {
                event.preventDefault();
                const password = document.getElementById('password').value.trim();
                const confirmPassword = document.getElementById('confirmPassword').value.trim();
                if (!password || password.length < 6) {
                    setFeedback('Senha mínima de 6 caracteres.', 'warn');
                    return;
                }
                if (password !== confirmPassword) {
                    setFeedback('As senhas não conferem.', 'warn');
                    return;
                }

                button.disabled = true;
                button.textContent = 'Salvando...';
                try {
                    const session = await supabase.auth.getSession();
                    if (!session?.data?.session) {
                        setFeedback('Sessão de recuperação não encontrada. Solicite um novo link.', 'error');
                        return;
                    }

                    const { error } = await supabase.auth.updateUser({ password });
                    if (error) {
                        setFeedback('Erro ao atualizar senha.', 'error');
                        return;
                    }

                    try {
                        await supabase.auth.signOut();
                    } catch {}

                    setFeedback('Senha atualizada com sucesso. Faça login novamente.', 'success');
                    setTimeout(() => {
                        window.location.href = '/v2/client/login.html';
                    }, 600);
                } finally {
                    button.disabled = false;
                    button.textContent = originalText;
                }
            });
        });
    </script>
</body>
</html>
