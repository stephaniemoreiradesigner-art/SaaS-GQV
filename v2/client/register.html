<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Cliente V2 - Primeiro Acesso</title>
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/theme.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-100 py-12 px-4 font-sans text-slate-900">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center">
            <img class="mx-auto h-16 w-auto mb-6 object-contain" src="/assets/logo.png" alt="Gestão Que Vende">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Criar acesso ao Portal do Cliente</h2>
            <p class="mt-2 text-sm text-slate-500">Crie sua senha para acessar o painel</p>
        </div>
        <form class="mt-8 space-y-6" id="client-register-form">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-slate-400 text-sm"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm"
                            placeholder="seu@email.com">
                    </div>
                    <p id="email-invite-note" class="text-xs text-slate-500 mt-2 hidden">E-mail preenchido a partir do convite.</p>
                </div>
                <div id="manual-client-id-wrapper" class="hidden">
                    <label for="manualClientId" class="block text-xs font-medium text-slate-500 mb-1">ID do Cliente (uso interno)</label>
                    <input id="manualClientId" name="manualClientId" type="number" min="1"
                        class="appearance-none block w-full px-3 py-2 border border-dashed border-amber-300 rounded-lg placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-amber-400 sm:text-xs bg-amber-50/40"
                        placeholder="Ex: 14">
                    <p class="mt-1 text-[11px] text-amber-700">Preencha apenas se você souber o ID exato do cliente exibido na Agency V2.</p>
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-400 text-sm"></i>
                        </div>
                        <input id="password" name="password" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm"
                            placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1">Confirmar Senha</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-lock text-slate-400 text-sm"></i>
                        </div>
                        <input id="confirmPassword" name="confirmPassword" type="password" required minlength="6"
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm"
                            placeholder="Repita a senha">
                    </div>
                </div>
            </div>
            <div id="client-register-feedback" class="hidden text-sm rounded-lg px-3 py-2"></div>
            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-md hover:shadow-lg">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-user-plus text-white/70 group-hover:text-white transition-colors"></i>
                    </span>
                    Criar acesso
                </button>
            </div>
        </form>
        <div class="text-center mt-4 pt-4 border-t border-slate-100">
            <p class="text-sm text-slate-600">
                Já tem uma conta?
                <a href="/v2/client/login.html" class="font-medium text-primary hover:text-primary-hover transition-colors">
                    Faça Login
                </a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/v2/core/supabase.js"></script>
    <script src="/js/v2/shared/auth_guard.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/v2/client/client_auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('client-register-form');
            if (!form) return;
            const emailInputElement = document.getElementById('email');
            const inviteNote = document.getElementById('email-invite-note');
            const feedback = document.getElementById('client-register-feedback');
            const params = new URLSearchParams(window.location.search);
            const inviteEmail = String(params.get('email') || '').trim().toLowerCase();
            const inviteClientId = String(params.get('client_id') || params.get('cliente_id') || params.get('tenant_id') || '').trim();
            const manualClientIdInput = document.getElementById('manualClientId');
            const manualClientIdWrapper = document.getElementById('manual-client-id-wrapper');

            const setFeedback = (message, type = 'error') => {
                if (!feedback) return;
                feedback.textContent = message;
                feedback.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border', 'border-red-100', 'bg-amber-50', 'text-amber-800', 'border-amber-100', 'bg-green-50', 'text-green-700', 'border-green-100');
                if (type === 'success') {
                    feedback.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-100');
                } else if (type === 'warn') {
                    feedback.classList.add('bg-amber-50', 'text-amber-800', 'border', 'border-amber-100');
                } else {
                    feedback.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-100');
                }
            };
            
            if (inviteEmail && emailInputElement) {
                emailInputElement.value = inviteEmail;
                emailInputElement.readOnly = true;
                emailInputElement.classList.add('bg-slate-100');
                if (inviteNote) inviteNote.classList.remove('hidden');
            }
            if (!inviteClientId && manualClientIdWrapper) {
                manualClientIdWrapper.classList.remove('hidden');
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const btn = form.querySelector('button');
                const originalContent = btn.innerHTML;

                if (!email) {
                    setFeedback('Informe um e-mail válido.', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    setFeedback('As senhas não conferem.', 'error');
                    return;
                }
                const manualClientId = manualClientIdInput ? String(manualClientIdInput.value || '').trim() : '';
                const effectiveClientId = inviteClientId || manualClientId;
                if (!effectiveClientId) {
                    setFeedback('Informe o ID do cliente (veja o ID no card da Agency V2) ou utilize um link de convite com client_id.', 'warn');
                    if (manualClientIdInput) manualClientIdInput.focus();
                    return;
                }

                btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Criando...';
                btn.disabled = true;

                try {
                    if (!window.ClientAuth?.registerAndLink) {
                        throw new Error('Módulo de registro do portal não carregou corretamente.');
                    }
                    const result = await window.ClientAuth.registerAndLink(email, password, { clientId: effectiveClientId });

                    if (result.success) {
                        setFeedback('Conta criada com sucesso! Faça login.', 'success');
                        window.location.href = '/v2/client/login.html';
                    } else {
                        setFeedback(result.error || 'Erro ao criar conta.', 'error');
                    }
                } catch (error) {
                    setFeedback(error.message ? `Erro inesperado: ${error.message}` : 'Erro inesperado no registro.', 'error');
                } finally {
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
