<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Gestão Que Vende</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <!-- Theme & Tailwind -->
    <script src="js/theme.js"></script>
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
        <div class="text-center">
            <img id="logo-sidebar" class="mx-auto h-20 w-auto mb-6 object-contain" src="assets/logo.png" alt="Gestão Que Vende">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Recuperar Senha</h2>
            <p class="mt-2 text-sm text-gray-500">
                Digite seu e-mail para receber as instruções
            </p>
        </div>
        
        <form class="mt-8 space-y-6" id="forgotPasswordForm">
            <div class="space-y-4">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fas fa-envelope text-gray-400 text-sm"></i>
                        </div>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                            class="appearance-none block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary sm:text-sm transition-all shadow-sm" 
                            placeholder="seu@email.com">
                    </div>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-primary hover:bg-primary-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-paper-plane text-white/70 group-hover:text-white transition-colors"></i>
                    </span>
                    Enviar Instruções
                </button>
            </div>
        </form>
        
        <div class="text-center mt-4 pt-4 border-t border-gray-100">
            <p class="text-sm text-gray-600">
                Lembrou sua senha? 
                <a href="index.html" class="font-medium text-primary hover:text-primary-hover transition-colors">
                    Voltar para o Login
                </a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script>
        const getSupabaseClient = async () => {
            if (window.supabaseClient) return window.supabaseClient;
            if (typeof window.initSupabase === 'function') {
                const ok = await window.initSupabase();
                if (ok && window.supabaseClient) return window.supabaseClient;
            }
            return null;
        };

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('Forgot Password Script Iniciado');
            
            const supabase = await getSupabaseClient();
            if (!supabase) {
                console.error('Supabase não carregado');
                alert('Erro de carregamento. Verifique sua conexão.');
                return;
            }

            let appUrl = '';
            try {
                const configResponse = await fetch(`${window.API_BASE_URL}/api/config`);
                if (configResponse.ok) {
                    const configData = await configResponse.json();
                    appUrl = (configData?.app_url || '').trim();
                }
            } catch (e) {
                console.error('Erro ao carregar config:', e);
            }

            if (!appUrl) {
                appUrl = window.location.origin;
            }

            const forgotPasswordForm = document.getElementById('forgotPasswordForm');
            if (forgotPasswordForm) {
                forgotPasswordForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    
                    const email = document.getElementById('email').value;
                    const btn = forgotPasswordForm.querySelector('button');
                    const originalContent = btn.innerHTML;

                    try {
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Enviando...';
                        btn.disabled = true;
                        btn.classList.add('opacity-75', 'cursor-not-allowed');

                        // Redireciona para a página de atualização de senha
                        // Assumindo que update_password.html estará na mesma pasta
                        const redirectUrl = appUrl.replace(/\/$/, '') + '/update_password.html';

                        const { error } = await supabase.auth.resetPasswordForEmail(email, {
                            redirectTo: redirectUrl,
                        });

                        if (error) throw error;

                        alert('Se o e-mail estiver cadastrado, você receberá um link para redefinir sua senha em instantes.');
                        window.location.href = 'index.html';

                    } catch (error) {
                        console.error('Erro Recuperação:', error);
                        alert('Erro ao solicitar recuperação: ' + error.message);
                    } finally {
                        btn.innerHTML = originalContent;
                        btn.disabled = false;
                        btn.classList.remove('opacity-75', 'cursor-not-allowed');
                    }
                });
            }
        });
    </script>
</body>
</html>
